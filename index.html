<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hopenity Reels</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000; color:white;
      font-family: system-ui, sans-serif;
      height:100vh; overflow:hidden;
    }
    .container {
      height:100vh; overflow-y:scroll;
      scroll-snap-type:y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .container::-webkit-scrollbar { display:none; }

    .reel {
      height:100vh; scroll-snap-align:start; scroll-snap-stop:always;
      position:relative; display:flex;
      align-items:center; justify-content:center; background:#111;
      overflow:hidden;
    }
    .video-wrapper {
      position:relative; width:100%; height:100%; max-width:425px; background:#000;
    }
    video {
      width:100%; height:100%; object-fit:cover; display:block; cursor:pointer;
    }

    /* Tap overlay - receives click for pause/play */
    .tap-area {
      position:absolute; inset:0; z-index:10; cursor:pointer;
    }

    /* Pause/Play icon in center */
    .play-pause-icon {
      position:absolute; top:50%; left:50%;
      transform: translate(-50%, -50%) scale(0);
      width:72px; height:72px; border-radius:50%;
      background:rgba(0,0,0,0.55);
      display:flex; align-items:center; justify-content:center;
      z-index:20; pointer-events:none;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), opacity 0.25s;
      opacity:0;
    }
    .play-pause-icon svg { width:34px; height:34px; fill:white; }
    .play-pause-icon.pop {
      transform: translate(-50%, -50%) scale(1);
      opacity:1;
    }
    .play-pause-icon.fade-out {
      transform: translate(-50%, -50%) scale(1.25);
      opacity:0;
    }

    /* Progress bar */
    .progress-bar {
      position:absolute; bottom:0; left:0; right:0;
      height:3px; background:rgba(255,255,255,0.2); z-index:25;
    }
    .progress-fill {
      height:100%; width:0%;
      background:#ff2d55;
      transition: width 0.1s linear;
    }

    /* Bottom Info */
    .bottom-info {
      position:absolute; bottom:80px; left:16px; right:76px; z-index:15;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      padding: 48px 0 0 0;
    }
    .user-info {
      display:flex; align-items:center; gap:10px; margin-bottom:8px;
    }
    .user-info img {
      width:42px; height:42px; border-radius:50%;
      border:2px solid white; object-fit:cover; flex-shrink:0;
      background:#333;
    }
    .username { font-size:1rem; font-weight:700; }
    .verified {
      display:inline-flex; align-items:center;
      margin-left:4px; vertical-align:middle;
    }
    .verified svg { width:14px; height:14px; fill:#4fc3f7; }
    .caption-wrap { margin-bottom:8px; }
    .caption {
      font-size:0.92rem; line-height:1.45;
      text-shadow:0 1px 6px rgba(0,0,0,0.8);
      white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis;
      display:block;
    }
    .caption.expanded {
      white-space:normal; overflow:visible;
      text-overflow:unset;
      display:-webkit-box; -webkit-line-clamp:999;
      -webkit-box-orient:vertical;
    }
    .caption-toggle {
      font-size:0.8rem; color:rgba(255,255,255,0.6);
      cursor:pointer; display:inline-block;
      margin-top:3px; user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .caption-toggle:hover { color:rgba(255,255,255,0.9); }
    .music-row {
      display:flex; align-items:center; gap:6px;
      font-size:0.78rem; color:rgba(255,255,255,0.65);
      overflow:hidden;
    }
    .music-row svg { width:12px; height:12px; fill:rgba(255,255,255,0.65); flex-shrink:0; }
    .music-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Right Actions */
    .right-actions {
      position:absolute; right:12px; bottom:100px;
      display:flex; flex-direction:column; gap:20px; z-index:20;
    }
    .action-btn {
      display:flex; flex-direction:column; align-items:center; gap:4px;
      cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .action-circle {
      width:46px; height:46px; border-radius:50%;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(8px);
      border:0.5px solid rgba(255,255,255,0.2);
      display:flex; align-items:center; justify-content:center;
      transition: transform 0.15s, background 0.2s;
    }
    .action-btn:active .action-circle { transform:scale(0.86); }
    .action-circle svg { width:22px; height:22px; fill:white; }
    .action-label { font-size:0.75rem; font-weight:500; color:rgba(255,255,255,0.85); }

    /* Share button accent */
    .share-btn .action-circle {
      background:rgba(255,45,85,0.18);
      border-color:rgba(255,45,85,0.4);
    }
    .share-btn .action-circle svg { fill:#ff2d55; }

    /* Mute button */
    .mute-btn {
      position:absolute; right:16px; top:56px; z-index:25;
      width:36px; height:36px; border-radius:50%;
      background:rgba(0,0,0,0.5);
      border:0.5px solid rgba(255,255,255,0.2);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
    }
    .mute-btn svg { width:18px; height:18px; fill:white; }

    /* Toast */
    #toast {
      position:fixed; bottom:96px; left:50%;
      transform:translateX(-50%) translateY(16px);
      background:rgba(20,20,20,0.92);
      color:white; padding:10px 22px;
      border-radius:24px; font-size:0.82rem;
      z-index:100; opacity:0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events:none;
      border:0.5px solid rgba(255,255,255,0.15);
      white-space:nowrap;
    }
    #toast.show {
      opacity:1; transform:translateX(-50%) translateY(0);
    }

    /* Loading spinner */
    .loading-overlay {
      position:absolute; inset:0; background:#111;
      display:flex; align-items:center; justify-content:center; z-index:5;
    }
    .spinner {
      width:38px; height:38px;
      border:3px solid rgba(255,255,255,0.12);
      border-top-color:#ff2d55;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div class="container" id="reelContainer"></div>
<div id="toast"></div>

<script>
const container = document.getElementById('reelContainer');
const toast = document.getElementById('toast');

let globalMuted = false;

// ====== Example video (fallback) ======
const exampleVideo = {
  post_id: 143392,
  string_post_id: "cmo6rbwh4008azqow7iarqrp0",
  title: "পাবেনা কেউ তোমাকে তুমি কারো নও 🤍✨",
  media_url: "https://hopenity.nikolacdn.com/videos/35408-1776663101747/master.m3u8",
  name: "No Rules YT",
  is_verified: true,
  user_image: "https://hopenity.nikolacdn.com/photos/35408-1775554092204.webp",
  like_count: 7,
  view_count: 279,
  comment_count: 0,
  music_title: "পাবেনা কেউ তোমাকে তুমি কারো নও"
};

// ====== Pull-to-refresh (first reel এ up scroll করলে) ======
let touchStartY = 0;
let pullActive  = false;

document.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  pullActive  = container.scrollTop === 0;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!pullActive) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 60) location.reload();
}, { passive: true });

// Mouse wheel for desktop: scroll up থেকে when already at top
let lastWheelTop = 0;
container.addEventListener('wheel', e => {
  if (container.scrollTop === 0 && e.deltaY < -40 && lastWheelTop === 0) {
    location.reload();
  }
  lastWheelTop = container.scrollTop;
}, { passive: true });

// ====== Load videos.json ======
fetch('videos.json')
  .then(r => r.json())
  .then(data => {
    let arr = Array.isArray(data) ? data : [data];
    // Shuffle করা — TikTok random feed এর মতো
    arr = arr.sort(() => Math.random() - 0.5);
    renderVideos(arr);
  })
  .catch(() => {
    console.warn('videos.json পাওয়া যায়নি — example দেখানো হচ্ছে');
    renderVideos([exampleVideo]);
  });

// ====== Helpers ======
function fmtNum(n) {
  n = n || 0;
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function getShareUrl(v) {
  if (v.string_post_id) return `https://hopenity.com/post/${v.string_post_id}`;
  if (v.post_id)        return `https://hopenity.com/post/${v.post_id}`;
  return 'https://hopenity.com';
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2600);
}

async function copyLink(url) {
  try {
    if (navigator.clipboard) await navigator.clipboard.writeText(url);
    else {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
    }
    showToast('✓  লিংক কপি হয়েছে!');
  } catch {
    showToast(url);
  }
}

function muteIconSVG(muted) {
  return muted
    ? `<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
}

// ====== Render ======
function renderVideos(videos) {
  container.innerHTML = '';

  videos.forEach((vdata, idx) => {
    const reel = document.createElement('div');
    reel.className = 'reel';
    reel.dataset.idx = idx;

    reel.innerHTML = `
      <div class="video-wrapper">
        <div class="loading-overlay"><div class="spinner"></div></div>

        <video id="vid-${idx}" loop playsinline></video>

        <!-- Tap area for pause/play -->
        <div class="tap-area" id="tap-${idx}"></div>

        <!-- Pause/play icon -->
        <div class="play-pause-icon" id="ppi-${idx}">
          <svg id="ppi-svg-${idx}" viewBox="0 0 24 24">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </div>

        <!-- Bottom info -->
        <div class="bottom-info">
          <div class="user-info">
            <img src="${vdata.user_image || ''}"
              onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 42 42%22><rect width=%2242%22 height=%2242%22 fill=%22%23333%22/><text x=%2221%22 y=%2227%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2218%22>${(vdata.name || '?')[0]}</text></svg>'"
              alt="">
            <span class="username">${escHtml(vdata.name || 'Unknown')}${vdata.is_verified
              ? `<span class="verified"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>`
              : ''}</span>
          </div>
          <div class="caption-wrap" id="cwrap-${idx}">
            <span class="caption" id="cap-${idx}">${escHtml(vdata.title || '')}</span>
            <span class="caption-toggle" id="ctog-${idx}" style="display:none">... আরো</span>
          </div>
          ${vdata.music_title ? `
          <div class="music-row">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <span class="music-text">${escHtml(vdata.music_title)}</span>
          </div>` : ''}
        </div>

        <!-- Right actions -->
        <div class="right-actions">
          <div class="action-btn like-btn" data-idx="${idx}">
            <div class="action-circle">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <span class="action-label">${fmtNum(vdata.like_count)}</span>
          </div>

          <div class="action-btn">
            <div class="action-circle">
              <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
            </div>
            <span class="action-label">${fmtNum(vdata.comment_count)}</span>
          </div>

          <div class="action-btn">
            <div class="action-circle">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
            <span class="action-label">${fmtNum(vdata.view_count)}</span>
          </div>

          <div class="action-btn share-btn" data-idx="${idx}">
            <div class="action-circle">
              <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
            </div>
            <span class="action-label">শেয়ার</span>
          </div>
        </div>

        <!-- Mute button -->
        <div class="mute-btn" id="mute-${idx}">${muteIconSVG(false)}</div>

        <!-- Progress bar -->
        <div class="progress-bar">
          <div class="progress-fill" id="prog-${idx}"></div>
        </div>
      </div>
    `;

    container.appendChild(reel);

    // ---- Elements ----
    const video   = document.getElementById(`vid-${idx}`);
    const tapArea = document.getElementById(`tap-${idx}`);
    const ppi     = document.getElementById(`ppi-${idx}`);
    const ppiSvg  = document.getElementById(`ppi-svg-${idx}`);
    const prog    = document.getElementById(`prog-${idx}`);
    const muteBtn = document.getElementById(`mute-${idx}`);
    const loading = reel.querySelector('.loading-overlay');

    // ---- HLS Setup ----
    if (Hls.isSupported()) {
      const hls = new Hls({ lowLatencyMode: true, enableWorker: false });
      hls.loadSource(vdata.media_url);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = vdata.media_url;
    }

    video.addEventListener('canplay', () => {
      if (loading) loading.style.display = 'none';
    });

    // ---- Progress bar ----
    video.addEventListener('timeupdate', () => {
      if (video.duration) {
        prog.style.width = ((video.currentTime / video.duration) * 100) + '%';
      }
    });

    // ---- Tap to pause/play ----
    let ppiTimer = null;
    tapArea.addEventListener('click', () => {
      clearTimeout(ppiTimer);
      if (video.paused) {
        video.play().catch(() => {});
        // Show play icon briefly
        ppiSvg.innerHTML = `<path d="M8 5v14l11-7z"/>`;
        ppi.classList.remove('fade-out');
        ppi.classList.add('pop');
        ppiTimer = setTimeout(() => {
          ppi.classList.add('fade-out');
          setTimeout(() => { ppi.classList.remove('pop','fade-out'); }, 280);
        }, 600);
      } else {
        video.pause();
        // Show pause icon — stays visible while paused
        ppiSvg.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
        ppi.classList.remove('fade-out');
        ppi.classList.add('pop');
      }
    });

    // Hide pause icon when video resumes from elsewhere
    video.addEventListener('play', () => {
      ppi.classList.remove('pop','fade-out');
    });

    // ---- Mute toggle ----
    muteBtn.addEventListener('click', e => {
      e.stopPropagation();
      globalMuted = !globalMuted;
      document.querySelectorAll('video').forEach(v => v.muted = globalMuted);
      document.querySelectorAll('[id^="mute-"]').forEach(btn => {
        btn.innerHTML = muteIconSVG(globalMuted);
      });
    });

    // ---- Caption expand/collapse ----
    const cap  = document.getElementById(`cap-${idx}`);
    const ctog = document.getElementById(`ctog-${idx}`);
    const title = vdata.title || '';
    // Show toggle only if text is long enough to overflow
    requestAnimationFrame(() => {
      if (cap.scrollWidth > cap.clientWidth + 2) ctog.style.display = 'inline';
    });
    let capExpanded = false;
    ctog.addEventListener('click', e => {
      e.stopPropagation();
      capExpanded = !capExpanded;
      cap.classList.toggle('expanded', capExpanded);
      ctog.textContent = capExpanded ? ' কম দেখাও' : '... আরো';
    });

    // ---- Share button ----
    reel.querySelector('.share-btn').addEventListener('click', e => {
      e.stopPropagation();
      copyLink(getShareUrl(vdata));
    });

    // ---- Like animation ----
    reel.querySelector('.like-btn').addEventListener('click', e => {
      e.stopPropagation();
      const circle = e.currentTarget.querySelector('.action-circle');
      circle.style.background = 'rgba(255,45,85,0.4)';
      circle.style.transform  = 'scale(1.35)';
      setTimeout(() => {
        circle.style.background = '';
        circle.style.transform  = '';
      }, 320);
    });

    // ---- IntersectionObserver: auto play/pause ----
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          video.muted = globalMuted;
          video.play().catch(() => {});
        } else {
          video.pause();
          video.currentTime = 0;
          prog.style.width = '0%';
          ppi.classList.remove('pop', 'fade-out');
        }
      });
    }, { threshold: 0.75 });

    observer.observe(reel);
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
