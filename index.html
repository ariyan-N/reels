<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hopenity Reels</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000; color:white; font-family:system-ui, sans-serif;
      height:100vh; overflow:hidden;
    }
    .container {
      height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .reel {
      height:100vh; scroll-snap-align:start; position:relative;
      display:flex; align-items:center; justify-content:center; background:#111;
    }
    .video-wrapper {
      position:relative; width:100%; height:100%; max-width:425px; background:#000;
    }
    video {
      width:100%; height:100%; object-fit:cover;
    }
    .overlay {
      position:absolute; bottom:0; left:0; right:0; padding:25px 20px 90px;
      background:linear-gradient(transparent, rgba(0,0,0,0.92)); z-index:10;
    }
    .user-info {
      display:flex; align-items:center; gap:12px; margin-bottom:12px;
    }
    .user-info img {
      width:48px; height:48px; border-radius:50%; border:2px solid #fff; object-fit:cover;
    }
    .username { font-size:1.15rem; font-weight:600; }
    .verified { color:#00d4ff; font-size:1.3rem; margin-left:4px; }
    .title { font-size:1.32rem; font-weight:600; line-height:1.35; margin-bottom:15px; }
    .stats { display:flex; gap:20px; font-size:1rem; margin-bottom:12px; }

    .sound-btn {
      position: absolute;
      bottom: 100px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 24px;
      z-index: 20;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container" id="reelContainer"></div>

  <script>
    const container = document.getElementById('reelContainer');

    fetch('videos.json')
      .then(res => res.json())
      .then(videos => {
        if (videos.length === 0) {
          container.innerHTML = `<h2 style="text-align:center;margin-top:200px;">No videos found</h2>`;
          return;
        }

        // Create all reels
        videos.forEach((videoData, index) => {
          const reel = document.createElement('div');
          reel.className = 'reel';
          reel.id = `reel-${index}`;

          const verifiedHTML = videoData.is_verified ? `<span class="verified">✔</span>` : '';

          reel.innerHTML = `
            <div class="video-wrapper">
              <video id="video-${index}" loop playsinline></video>
              
              <div class="overlay">
                <div class="user-info">
                  <img src="${videoData.user_image || ''}" alt="">
                  <div>
                    <span class="username">${videoData.name}</span>
                    ${verifiedHTML}
                  </div>
                </div>
                <div class="title">${videoData.title}</div>
                <div class="stats">
                  ❤️ ${videoData.like_count} &nbsp; 👁️ ${videoData.view_count} &nbsp; 💬 ${videoData.comment_count}
                </div>
                ${videoData.music_title ? `<div style="margin-top:8px;opacity:0.85;">🎵 ${videoData.music_title}</div>` : ''}
              </div>

              <button class="sound-btn" id="sound-${index}">🔇</button>
            </div>
          `;

          container.appendChild(reel);

          const video = document.getElementById(`video-${index}`);
          const soundBtn = document.getElementById(`sound-${index}`);

          // HLS Setup
          if (Hls.isSupported()) {
            const hls = new Hls({ lowLatencyMode: true });
            hls.loadSource(videoData.media_url);
            hls.attachMedia(video);
          } else {
            video.src = videoData.media_url;
          }

          // Sound Button
          soundBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            soundBtn.textContent = video.muted ? '🔇' : '🔊';
          });

          // Intersection Observer for auto play + unmute
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                video.play().catch(() => {});
                video.muted = false;
                soundBtn.textContent = '🔊';
              } else {
                video.pause();
              }
            });
          }, { threshold: 0.8 });

          observer.observe(reel);
        });

        // ================== RANDOM START ==================
        const randomIndex = Math.floor(Math.random() * videos.length);
        console.log(`🎲 Randomly starting from video index: ${randomIndex}`);

        // Scroll to random reel after everything loads
        setTimeout(() => {
          const randomReel = document.getElementById(`reel-${randomIndex}`);
          if (randomReel) {
            randomReel.scrollIntoView({
              behavior: "smooth",
              block: "start"
            });
          }
        }, 800);   // 800ms পর স্ক্রল করবে (ভিডিও লোড হওয়ার জন্য)

      })
      .catch(err => {
        console.error(err);
        container.innerHTML = `<h2 style="text-align:center;margin-top:200px;color:#ff8888;">videos.json লোড করতে সমস্যা হয়েছে</h2>`;
      });
  </script>
</body>
</html>
