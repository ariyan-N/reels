<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hopenity Reels</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: white;
      overflow: hidden;
      height: 100vh;
    }

    .container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .reel {
      height: 100vh;
      width: 100%;
      position: relative;
      scroll-snap-align: start;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 425px;
      margin: 0 auto;
      background: #000;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay */
    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 25px 20px 90px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      z-index: 10;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .user-info img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      object-fit: cover;
    }

    .username {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .verified {
      color: #00d4ff;
      font-size: 1.3rem;
      margin-left: 4px;
    }

    .title {
      font-size: 1.32rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 15px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.95;
    }

    .music {
      font-size: 0.95rem;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Like, View, Comment icons */
    .stat-item span {
      font-size: 1.3rem;
    }
  </style>
</head>
<body>
  <div class="container" id="reelContainer"></div>

  <script>
    const container = document.getElementById('reelContainer');

    fetch('videos.json')
      .then(response => response.json())
      .then(videos => {
        if (videos.length === 0) {
          container.innerHTML = `<h2 style="text-align:center; margin-top:100px; color:#ccc;">No videos found in videos.json</h2>`;
          return;
        }

        videos.forEach((videoData, index) => {
          const reel = document.createElement('div');
          reel.className = 'reel';

          const verifiedHTML = videoData.is_verified 
            ? `<span class="verified">✔</span>` 
            : '';

          reel.innerHTML = `
            <div class="video-wrapper">
              <video id="video-${index}" loop muted playsinline></video>
              
              <div class="overlay">
                <div class="user-info">
                  <img src="${videoData.user_image || 'https://via.placeholder.com/48'}" alt="profile">
                  <div>
                    <span class="username">${videoData.name}</span>
                    ${verifiedHTML}
                  </div>
                </div>
                
                <div class="title">${videoData.title}</div>
                
                <div class="stats">
                  <div class="stat-item"><span>❤️</span> ${videoData.like_count}</div>
                  <div class="stat-item"><span>👁️</span> ${videoData.view_count}</div>
                  <div class="stat-item"><span>💬</span> ${videoData.comment_count}</div>
                </div>
                
                ${videoData.music_title ? `
                <div class="music">
                  🎵 ${videoData.music_title}
                </div>` : ''}
              </div>
            </div>
          `;

          container.appendChild(reel);

          // Video Setup with HLS.js
          const videoElement = document.getElementById(`video-${index}`);
          const hlsUrl = videoData.media_url;

          if (Hls.isSupported()) {
            const hls = new Hls({
              enableWorker: true,
              lowLatencyMode: true,
              backBufferLength: 30
            });
            hls.loadSource(hlsUrl);
            hls.attachMedia(videoElement);
          } 
          else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            videoElement.src = hlsUrl;
          }

          // প্রথম ভিডিও অটো প্লে
          if (index === 0) {
            setTimeout(() => {
              videoElement.play().catch(() => {});
            }, 500);
          }
        });

        // Smooth Auto Play when in view
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            const video = entry.target.querySelector('video');
            if (entry.isIntersecting) {
              video.play().catch(() => {});
            } else {
              video.pause();
            }
          });
        }, { 
          threshold: 0.8 
        });

        document.querySelectorAll('.reel').forEach(reel => {
          observer.observe(reel);
        });

      })
      .catch(error => {
        console.error("Error loading videos.json:", error);
        container.innerHTML = `<h2 style="text-align:center; margin-top:100px; color:red;">videos.json লোড করতে সমস্যা হয়েছে</h2>`;
      });
  </script>
</body>
</html>
